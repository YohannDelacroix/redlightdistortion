<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>title</title>
        <link rel="stylesheet" href="styles/Header.css">
        <script src="scripts/Header.js" type="module">
          import {onLoadHeader, handleButtonHeader, getHeaderStyle} from "./scripts/Header.js";
          window.onLoadHeader = onLoadHeader;
          window.handleButtonHeader = handleButtonHeader;
          window.getHeaderStyle = getHeaderStyle;
        </script>
    </head>
    <body onLoad="onLoadHeader()">
        <!-- HEADER -->
        <header class={getHeaderStyle().headerClass}>
          <div class="header-nav">
      
              <nav class="header-left">
                <ul class="ul-header">
                  <li><a class="link-header" href="/Tour">Tour</a></li>
                  <li><a class="link-header" href="/News">News</a></li>
                  <li><a class="link-header" href="/Photos">Photos</a></li>
                </ul>
              </nav>
      
      
            <!-- Chemin du logo à completer -->
            <div class="header-logo">
              <a class="header-link-image" href="/Home">
                  <img class="header-logo-image" src="Assets/RLDLogoFondNoir.png" alt="Logo-RedLightdistortion" />
              </a>
            </div>
      
            <div class="header-mobile-nav">
              <button class="header-button" onClick={handleButtonHeader}><img class="header-img-button" src={getHeaderStyle().buttonImg} alt="nav" /></button>
            </div>
      
            <nav class="header-right">
            <ul class="ul-header">
              <li><a class="link-header" href="/Videos">Videos</a></li>
              <li><a class="link-header" href="/Universe">Universe</a></li>
              <li><a class="link-header" href="/About">About</a></li>
            </ul>
            </nav>
      
            <nav class={getHeaderStyle().navMobile}>
              <a href="Tour.html" class="link-header" onClick={handleButtonHeader}>Tour</a>
              <a href="News.html" class="link-header" onClick={handleButtonHeader}>News</a>
              <a href="Photos.html" class="link-header" onClick={handleButtonHeader}>Photos</a>
              <a href="Videos.html" class="link-header" onClick={handleButtonHeader}>Videos</a>
              <a href="Universe.html" class="link-header" onClick={handleButtonHeader}>Universe</a>
              <a href="About.html" class="link-header" onClick={handleButtonHeader}>About</a>
            </nav>
          </div>
        </header>


        <!-- HOME -->
        <div class="home">
            <div class="home-home-video">
              <div class="container-video">
                <iframe class="iframe-video" 
                src="https://www.youtube.com/embed/p0Y52_ej810"
                title="YouTube video player"
                frameBorder="0"
                allowFullScreen 
                origin="http://localhost:3000"
                />
              </div>
            </div>

                                loadingTour && <Loading />
